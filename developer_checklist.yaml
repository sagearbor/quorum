# ─── Deployment (Tech Expo) ───────────────────────────────────────

deployment:
  - id: D-001
    title: Deploy for tech expo (accessible on network)
    status: not_started
    priority: high
    options:
      quick_demo:
        method: "ngrok http 3004 (public tunnel to localhost)"
        pros: "5-minute setup, no infra changes"
        cons: "Single machine, ngrok free tier limits"
      azure_deploy:
        method: "Next.js → Azure Static Web Apps, FastAPI → Azure App Service"
        pros: "Production-grade, scalable"
        cons: "Requires Azure setup, CI/CD pipeline"
      docker:
        method: "Docker compose with Caddy reverse proxy"
        pros: "Portable, works on any machine on expo network"
        cons: "Requires Docker setup"
    notes: |
      Supabase options:
      - Supabase Cloud (supabase.com) — swap URL/keys, easiest
      - Self-host on Azure VM via Docker
      - Replace with Azure Database for PostgreSQL + Azure SignalR
      Azure does NOT natively host Supabase, but Supabase Cloud is the
      practical choice for the expo.

  - id: D-002
    title: Create Docker compose for local deployment
    status: not_started
    priority: medium
    files: ["docker-compose.yml", "Dockerfile.web", "Dockerfile.api"]

  - id: D-003
    title: Supabase Cloud migration
    status: not_started
    priority: medium
    notes: "Create project on supabase.com, apply migrations, update env vars"

